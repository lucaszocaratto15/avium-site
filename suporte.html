  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"46877e3c-5802-42a3-b26b-8a1d9d8dbc41\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f4e952e0-db75-4941-9357-5d4f4c99721a\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"360a048f-4321-4030-b364-27db80292057\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c2cf37c4-cc1b-4db3-b681-a88b09acfb7f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"46877e3c-5802-42a3-b26b-8a1d9d8dbc41\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Avium — Landing page\n   Brand: forest green #2E7D32 + amber + emblem accents\n   Type: Hanken Grotesk\n   ============================================================ */\n\n:root {\n  /* brand */\n  --brand: #2E7D32;\n  --brand-d: #1B5E20;\n  --brand-l: #EAF4EC;\n  --brand-tint: #F4F9F4;\n  --amber: #FFC107;\n  --amber-d: #B98900;\n  /* emblem accents */\n  --sun: #F07E1C;\n  --water: #1C77C0;\n  --crest: #E0330E;\n  /* ink + surfaces */\n  --ink: #13211a;\n  --ink-2: #4c5a51;\n  --ink-3: #8a988e;\n  --bg: #ffffff;\n  --bg-soft: #F5F8F5;\n  --line: #e7ece8;\n  --line-2: #d7ded8;\n  --card: #ffffff;\n  /* type */\n  --font-head: 'Hanken Grotesk', system-ui, sans-serif;\n  --font-body: 'Hanken Grotesk', system-ui, sans-serif;\n  /* layout */\n  --maxw: 1180px;\n  --radius: 22px;\n  --radius-lg: 30px;\n  --shadow-card: 0 1px 2px rgba(16,40,24,.05), 0 14px 40px rgba(16,40,24,.07);\n  --shadow-soft: 0 1px 2px rgba(16,40,24,.04), 0 8px 26px rgba(16,40,24,.05);\n  --shadow-phone: 0 40px 90px -24px rgba(16,40,24,.40), 0 12px 30px -10px rgba(16,40,24,.22);\n  --gut: 28px;\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  color: var(--ink);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  line-height: 1.55;\n  overflow-x: hidden;\n}\na { color: inherit; text-decoration: none; }\nimg { display: block; max-width: 100%; }\nh1, h2, h3, h4 { font-family: var(--font-head); margin: 0; line-height: 1.05; letter-spacing: -0.025em; font-weight: 800; }\np { margin: 0; }\nbutton { font-family: inherit; cursor: pointer; }\n\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gut); }\n\n/* eyebrow */\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 13px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;\n  color: var(--brand-d);\n}\n.eyebrow .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); }\n\n/* buttons */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 9px;\n  height: 54px; padding: 0 26px; border-radius: 14px; border: none;\n  font-size: 16.5px; font-weight: 700; letter-spacing: -0.01em;\n  transition: transform .14s ease, box-shadow .18s ease, background .18s ease;\n  white-space: nowrap;\n}\n.btn svg { width: 19px; height: 19px; }\n.btn-primary { background: var(--brand); color: #fff; box-shadow: 0 10px 26px -8px rgba(46,125,50,.55); }\n.btn-primary:hover { background: var(--brand-d); transform: translateY(-2px); box-shadow: 0 16px 34px -8px rgba(46,125,50,.6); }\n.btn-ghost { background: #fff; color: var(--ink); border: 1.5px solid var(--line-2); }\n.btn-ghost:hover { border-color: var(--brand); color: var(--brand-d); transform: translateY(-2px); }\n.btn-sm { height: 46px; padding: 0 20px; font-size: 15px; border-radius: 12px; }\n.btn-lg { height: 62px; padding: 0 36px; font-size: 18.5px; border-radius: 15px; }\n.btn-lg svg { width: 21px; height: 21px; }\n\n/* ============================================================ NAV */\n.nav {\n  position: sticky; top: 0; z-index: 50;\n  background: rgba(255,255,255,.82);\n  backdrop-filter: saturate(160%) blur(14px);\n  -webkit-backdrop-filter: saturate(160%) blur(14px);\n  border-bottom: 1px solid transparent;\n  transition: border-color .2s, box-shadow .2s;\n}\n.nav.scrolled { border-color: var(--line); box-shadow: 0 6px 24px -16px rgba(16,40,24,.3); }\n.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 76px; }\n.brand { display: flex; align-items: center; gap: 11px; }\n.brand img { width: 40px; height: 40px; }\n.brand .wm { font-family: var(--font-head); font-weight: 800; font-size: 23px; letter-spacing: -0.03em; }\n.nav-links { display: flex; align-items: center; gap: 34px; }\n.nav-links a { font-size: 15.5px; font-weight: 600; color: var(--ink-2); transition: color .15s; }\n.nav-links a:hover { color: var(--brand-d); }\n.nav-cta { display: flex; align-items: center; gap: 14px; }\n.nav-burger { display: none; }\n\n/* ============================================================ HERO */\n.hero { position: relative; padding: 76px 0 40px; }\n.hero::before {\n  content: \"\"; position: absolute; inset: 0; z-index: -1;\n  background:\n    radial-gradient(1100px 520px at 78% -8%, var(--brand-tint), transparent 62%),\n    radial-gradient(700px 420px at 4% 8%, #FBF7EC, transparent 60%);\n}\n.hero-grid { display: grid; grid-template-columns: 1.02fr .98fr; gap: 56px; align-items: center; }\n.hero-copy { max-width: 600px; }\n.hero h1 {\n  font-size: clamp(40px, 5.4vw, 66px); font-weight: 800; margin: 22px 0 0;\n  letter-spacing: -0.035em; text-wrap: balance;\n}\n.hero h1 .accent { color: var(--brand); }\n.hero-lede { font-size: clamp(17px, 1.6vw, 20px); color: var(--ink-2); margin-top: 22px; max-width: 540px; text-wrap: pretty; }\n.hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 34px; }\n.hero-trust { display: flex; align-items: center; gap: 18px; margin-top: 30px; flex-wrap: wrap; }\n.hero-trust .item { display: inline-flex; align-items: center; gap: 9px; font-size: 14.5px; color: var(--ink-2); font-weight: 600; }\n.hero-trust .item svg { width: 18px; height: 18px; color: var(--brand); flex-shrink: 0; }\n.hero-trust .div { width: 1px; height: 18px; background: var(--line-2); }\n\n/* hero phones */\n.hero-stage { position: relative; display: flex; justify-content: center; align-items: flex-end; min-height: 540px; }\n.phone { position: relative; }\n.phone img { width: 100%; height: auto; }\n.frame-shadow img { filter: drop-shadow(0 40px 70px rgba(16,40,24,.34)); }\n[data-frame=\"flat\"] .frame-shadow img { filter: none; }\n.hero-phone-main { width: 304px; z-index: 2; }\n.hero-phone-side { position: absolute; width: 232px; left: -2%; bottom: 30px; z-index: 1; opacity: .98; }\n.hero-blob {\n  position: absolute; z-index: 0; width: 430px; height: 430px; border-radius: 46% 54% 58% 42% / 52% 44% 56% 48%;\n  background: linear-gradient(155deg, var(--brand), var(--brand-d));\n  top: 18px; left: 50%; transform: translateX(-46%); opacity: .10;\n}\n.hero-chip {\n  position: absolute; z-index: 3; background: #fff; border-radius: 16px; padding: 12px 15px;\n  box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 11px;\n}\n.hero-chip .ic { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; flex-shrink: 0; }\n.hero-chip .t1 { font-size: 13px; font-weight: 800; line-height: 1.1; }\n.hero-chip .t2 { font-size: 11.5px; color: var(--ink-3); font-weight: 600; }\n.hero-chip.c1 { top: 60px; right: 2%; }\n.hero-chip.c2 { bottom: 56px; right: 8%; }\n\n/* centered hero variant */\n[data-hero=\"center\"] .hero-grid { grid-template-columns: 1fr; text-align: center; gap: 18px; }\n[data-hero=\"center\"] .hero-copy { max-width: 720px; margin: 0 auto; }\n[data-hero=\"center\"] .hero-lede { margin-left: auto; margin-right: auto; }\n[data-hero=\"center\"] .hero-actions, [data-hero=\"center\"] .hero-trust { justify-content: center; }\n[data-hero=\"center\"] .hero-stage { margin-top: 30px; min-height: 0; }\n[data-hero=\"center\"] .hero-phone-side { left: auto; right: 52%; bottom: 10px; }\n\n/* ============================================================ SECTION SHELL */\n.section { padding: 96px 0; }\n.section.soft { background: var(--bg-soft); }\n.sec-head { max-width: 660px; }\n.sec-head.center { margin: 0 auto; text-align: center; }\n.sec-head h2 { font-size: clamp(30px, 3.6vw, 44px); margin-top: 16px; letter-spacing: -0.03em; text-wrap: balance; }\n.sec-head p { font-size: 18px; color: var(--ink-2); margin-top: 16px; text-wrap: pretty; }\n\n/* ============================================================ FEATURES */\n.feat-layout { display: grid; grid-template-columns: 1fr 360px; gap: 60px; align-items: center; margin-top: 56px; }\n.feat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n.feat-card {\n  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);\n  padding: 26px 24px; box-shadow: var(--shadow-soft); transition: transform .16s, box-shadow .16s;\n}\n.feat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); }\n.feat-card .ic { width: 50px; height: 50px; border-radius: 14px; display: grid; place-items: center; margin-bottom: 16px; }\n.feat-card .ic svg { width: 25px; height: 25px; }\n.feat-card h3 { font-size: 19px; font-weight: 800; }\n.feat-card p { font-size: 14.8px; color: var(--ink-2); margin-top: 8px; line-height: 1.5; }\n.feat-aside { display: flex; justify-content: center; }\n.feat-aside .phone { width: 320px; }\n\n/* icon tints */\n.tint-green { background: var(--brand-l); color: var(--brand-d); }\n.tint-ink   { background: #EEF1EF; }\n.tint-amber { background: #FCF2D2; color: var(--amber-d); }\n.tint-water { background: #DEEEF9; color: var(--water); }\n.tint-sun   { background: #FCE8D6; color: #C2540C; }\n\n/* feature grid — 6 cols overview (no aside) */\n.feat-grid6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 56px; }\n\n/* showcase section — even, soft green tint that fades in/out (no hard divisions) */\n.sc-section {\n  background: linear-gradient(180deg, #ffffff 0%, #EAF3EA 26%, #EAF3EA 72%, #F4F8F4 100%);\n}\n\n/* ============================================================ SHOWCASE ROWS */\n.showcases { margin-top: 70px; display: flex; flex-direction: column; gap: 104px; }\n.showcase { display: flex; align-items: center; gap: 56px; }\n.showcase.flip { flex-direction: row-reverse; }\n.sc-media { flex: 0 0 auto; }\n.sc-media { position: relative; display: flex; justify-content: center; align-items: center; }\n.sc-media::before {\n  content: \"\"; position: absolute; z-index: 0; width: 360px; height: 360px;\n  top: 50%; left: 50%; transform: translate(-50%, -50%);\n  border-radius: 46% 54% 58% 42% / 52% 44% 56% 48%;\n  background: linear-gradient(155deg, var(--brand), var(--brand-d)); opacity: .08;\n}\n.sc-media .phone { width: 296px; position: relative; z-index: 1; }\n.sc-copy { flex: 1; max-width: 560px; }\n.sc-copy h3 { font-size: clamp(26px, 3vw, 36px); font-weight: 800; margin-top: 16px; letter-spacing: -0.03em; text-wrap: balance; }\n.sc-copy > p { font-size: 17.5px; color: var(--ink-2); margin-top: 16px; text-wrap: pretty; }\n.sc-list { list-style: none; padding: 0; margin: 24px 0 0; display: flex; flex-direction: column; gap: 13px; }\n.sc-list li { display: flex; gap: 13px; align-items: flex-start; font-size: 15.5px; color: var(--ink); line-height: 1.45; }\n.sc-list .ck { width: 24px; height: 24px; border-radius: 8px; background: var(--brand-l); display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; }\n.sc-list .ck svg { width: 14px; height: 14px; color: var(--brand-d); }\n.sc-metrics { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }\n.sc-metric {\n  flex: 1; min-width: 96px; background: var(--bg-soft); border: 1px solid var(--line);\n  border-radius: 16px; padding: 16px 18px;\n}\n.sc-metric .v { font-family: var(--font-head); font-size: 28px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; color: var(--brand-d); }\n.sc-metric .l { font-size: 13px; color: var(--ink-2); font-weight: 600; margin-top: 6px; }\n\n/* ============================================================ MARKETPLACE */\n.mkt-grid { display: grid; grid-template-columns: 420px 1fr; gap: 64px; align-items: center; margin-top: 56px; }\n.mkt-phones { position: relative; display: flex; justify-content: center; align-items: flex-end; }\n.mkt-phones .p-main { width: 290px; z-index: 2; }\n.mkt-phones .p-side { position: absolute; width: 220px; right: -6%; bottom: 36px; z-index: 1; }\n.mkt-points { display: flex; flex-direction: column; gap: 26px; margin-top: 8px; }\n.mkt-point { display: flex; 255,.5); color: #fff; }\n.cta-inner .btn-ghost:hover { background: rgba(255,255,255,.12); border-color: #fff; color: #fff; }\n.store-actions { gap: 16px; }\n.store-btn {\n  display: inline-flex; align-items: center; gap: 12px; height: 60px; padding: 0 24px;\n  border-radius: 15px; background: #fff; color: var(--brand-d);\n  box-shadow: 0 12px 30px -8px rgba(0,0,0,.3); transition: transform .14s ease, box-shadow .18s ease;\n}\n.store-btn:hover { transform: translateY(-2px); box-shadow: 0 18px 38px -8px rgba(0,0,0,.34); }\n.store-btn svg { width: 26px; height: 26px; flex-shrink: 0; }\n.store-btn .lines { display: flex; flex-direction: column; line-height: 1.05; text-align: left; }\n.store-btn .lines small { font-size: 11.5px; font-weight: 600; letter-spacing: .01em; opacity: .82; }\n.store-btn .lines strong { font-family: var(--font-head); font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }\n\n/* ============================================================ FOOTER */\n.footer { background: #0f1a13; color: #c5d2c8; padding: 64px 0 36px; }\n.footer-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 40px; }\n.footer .brand .wm { color: #fff; }\n.footer-about { font-size: 14.5px; color: #97a89c; margin-top: 16px; max-width: 280px; line-height: 1.55; }\n.footer-col h4 { font-size: 13px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: #fff; margin-bottom: 16px; }\n.footer-col a { display: block; font-size: 14.5px; color: #a9b8ad; margin-bottom: 11px; transition: color .15s; }\n.footer-col a:hover { color: #fff; }\n.footer-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 48px; padding-top: 26px; border-top: 1px solid rgba(255,255,255,.1); font-size: 13.5px; color: #7e8f84; flex-wrap: wrap; gap: 12px; }\n\n/* ============================================================ REVEAL */\n.av-reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.2,.6,.2,1), transform .7s cubic-bezier(.2,.6,.2,1); }\n.av-reveal.av-in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce) { .av-reveal { opacity: 1; transform: none; transition: none; } }\n@media print { .av-reveal { opacity: 1 !important; transform: none !important; } }\n\n/* hidden sections via tweak */\n[data-hide-marketplace=\"true\"] #marketplace,\n[data-hide-gallery=\"true\"] #galeria,\n[data-hide-plans=\"true\"] #planos { display: none; }\n\n/* ============================================================ RESPONSIVE */\n@media (max-width: 980px) {\n  .hero-grid { grid-template-columns: 1fr; gap: 30px; }\n  .hero-stage { min-height: 0; margin-top: 16px; }\n  .hero-phone-side { display: none; }\n  .hero-blob { transform: translateX(-50%); }\n  .feat-layout { grid-template-columns: 1fr; gap: 40px; }\n  .feat-aside { order: -1; }\n  .feat-grid6 { grid-template-columns: 1fr 1fr; }\n  .showcases { gap: 70px; }\n  .showcase, .showcase.flip { flex-direction: column; gap: 36px; align-items: stretch; }\n  .sc-copy { max-width: none; }\n  .mkt-grid { grid-template-columns: 1fr; gap: 44px; }\n  .mkt-phones { order: -1; }\n  .mkt-phones .p-side { right: 0; }\n  .plans { grid-template-columns: 1fr; max-width: 460px; margin-inline: auto; }\n  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }\n  .nav-links, .nav-cta .btn-ghost { display: none; }\n}\n@media (max-width: 620px) {\n  :root { --gut: 20px; }\n  .section { padding: 68px 0; }\n  .feat-grid { grid-template-columns: 1fr; }\n  .feat-grid6 { grid-template-columns: 1fr; }\n  .hero { padding: 48px 0 20px; }\n  .hero-actions .btn { flex: 1; }\n  .cta-inner { padding: 48px 26px; }\n  .footer-grid { grid-template-columns: 1fr 1fr; }\n  .hero-chip { display: none; }\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Avium — Suporte / Central de ajuda\n   Builds on landing.css tokens (load landing.css first)\n   ============================================================ */\n\n/* ---------- HERO ---------- */\n.sup-hero { position: relative; padding: 92px 0 64px; text-align: center; }\n.sup-hero::before {\n  content: \"\"; position: absolute; inset: 0; z-index: -1;\n  background:\n    radial-gradient(1000px 500px at 50% -12%, var(--brand-tint), transparent 60%),\n    radial-gradient(640px 380px at 12% 0%, #FBF7EC, transparent 62%);\n}\n.sup-hero .eyebrow { justify-content: center; }\n.sup-hero h1 {\n  font-size: clamp(36px, 5vw, 60px); font-weight: 800; margin: 20px auto 0;\n  letter-spacing: -0.035em; max-width: 760px; text-wrap: balance;\n}\n.sup-hero h1 .accent { color: var(--brand); }\n.sup-hero .lede {\n  font-size: clamp(17px, 1.6vw, 20px); color: var(--ink-2);\n  margin: 20px auto 0; max-width: 560px; text-wrap: pretty;\n}\n\n/* search */\n.sup-search { position: relative; max-width: 560px; margin: 34px auto 0; }\n.sup-search svg.mag {\n  position: absolute; left: 22px; top: 50%; transform: translateY(-50%);\n  width: 22px; height: 22px; color: var(--ink-3); pointer-events: none;\n}\n.sup-search input {\n  width: 100%; height: 64px; border: 1px solid var(--line-2); border-radius: 16px;\n  padding: 0 56px 0 56px; font-family: var(--font-body); font-size: 17px; color: var(--ink);\n  background: #fff; box-shadow: var(--shadow-soft); transition: border-color .16s, box-shadow .16s;\n}\n.sup-search input::placeholder { color: var(--ink-3); }\n.sup-search input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-l); }\n.sup-search .clear {\n  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);\n  width: 30px; height: 30px; border: none; background: var(--bg-soft); border-radius: 50%;\n  display: none; place-items: center; color: var(--ink-2);\n}\n.sup-search.has-val .clear { display: grid; }\n.sup-search .clear svg { width: 16px; height: 16px; }\n\n.sup-quick {\n  display: flex; justify-content: center; gap: 20px; margin-top: 26px; flex-wrap: wrap;\n}\n.sup-quick .item { display: inline-flex; align-items: center; gap: 8px; font-size: 14.5px; color: var(--ink-2); font-weight: 600; }\n.sup-quick .item svg { width: 18px; height: 18px; color: var(--brand); flex-shrink: 0; }\n.sup-quick .div { width: 1px; height: 18px; background: var(--line-2); }\n\n/* ---------- HELP CATEGORIES ---------- */\n.help-cats {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;\n  margin-top: -28px; position: relative; z-index: 2;\n}\n.help-cat {\n  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);\n  padding: 24px 22px; box-shadow: var(--shadow-soft); transition: transform .16s, box-shadow .16s, border-color .16s;\n  text-align: left; cursor: pointer;\n}\n.help-cat:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); border-color: var(--line-2); }\n.help-cat .ic { width: 48px; height: 48px; border-radius: 14px; display: grid; place-items: center; margin-bottom: 16px; }\n.help-cat .ic svg { width: 24px; height: 24px; }\n.help-cat h3 { font-size: 17.5px; font-weight: 800; }\n.help-cat p { font-size: 13.8px; color: var(--ink-2); margin-top: 6px; line-height: 1.45; }\n.help-cat .go {\n  display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;\n  font-size: 13.5px; font-weight: 700; color: var(--brand-d);\n}\n.help-cat .go svg { width: 15px; height: 15px; transition: transform .16s; }\n.help-cat:hover .go svg { transform: translateX(3px); }\n\n/* ---------- FAQ ---------- */\n.faq-wrap { max-width: 820px; margin: 0 auto; }\n.faq-group { margin-top: 56px; scroll-margin-top: 100px; }\n.faq-group:first-child { margin-top: 0; }\n.faq-group > .gh { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }\n.faq-group > .gh .gic { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }\n.faq-group > .gh .gic svg { width: 18px; height: 18px; }\n.faq-group > .gh h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }\n\n.faq-item {\n  border: 1px solid var(--line); border-radius: 16px; background: #fff;\n  margin-bottom: 12px; overflow: hidden; transition: border-color .16s, box-shadow .16s;\n}\n.faq-item.open { border-color: var(--line-2); box-shadow: var(--shadow-soft); }\n.faq-item .q {\n  display: flex; align-items: center; justify-content: space-between; gap: 18px;\n  width: 100%; border: none; background: transparent; text-align: left;\n  padding: 20px 22px; font-family: var(--font-head); font-size: 17px; font-weight: 700;\n  color: var(--ink); letter-spacing: -0.01em; line-height: 1.35;\n}\n.faq-item .q:hover { color: var(--brand-d); }\n.faq-item .chev {\n  width: 30px; height: 30px; border-radius: 50%; background: var(--brand-l);\n  display: grid; place-items: center; flex-shrink: 0; transition: background .16s;\n}\n.faq-item .chev svg { width: 16px; height: 16px; color: var(--brand-d); transition: transform .22s ease; }\n.faq-item.open .chev { background: var(--brand); }\n.faq-item.open .chev svg { color: #fff; transform: rotate(180deg); }\n.faq-item .a-wrap {\n  display: grid; grid-template-rows: 0fr; transition: grid-template-rows .26s ease;\n}\n.faq-item.open .a-wrap { grid-template-rows: 1fr; }\n.faq-item .a-inner { overflow: hidden; }\n.faq-item .a {\n  padding: 0 22px 22px; font-size: 15.5px; color: var(--ink-2); line-height: 1.6; max-width: 64ch;\n}\n.faq-item .a a { color: var(--brand-d); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }\n.faq-item .a strong { color: var(--ink); font-weight: 700; }\n\n/* no results */\n.faq-empty { display: none; text-align: center; padding: 48px 0; color: var(--ink-2); }\n.faq-empty.show { display: block; }\n.faq-empty .ec { width: 56px; height: 56px; border-radius: 16px; background: var(--bg-soft); display: grid; place-items: center; margin: 0 auto 16px; }\n.faq-empty .ec svg { width: 26px; height: 26px; color: var(--ink-3); }\n.faq-empty h3 { font-size: 19px; font-weight: 800; }\n.faq-empty p { margin-to
